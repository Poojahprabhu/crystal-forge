services:
  docs:
    image: crystal_forge_be_local_docs
    container_name: crystal_forge_be_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./crystal_forge_be:/app/crystal_forge_be:z
    ports:
      - '9000:9000'
    command: /start-docs
